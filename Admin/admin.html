<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MahaKali Admin
  </title>

  <link
    rel="stylesheet"
    href="admin.css"
  >

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <script
    src="https://kit.fontawesome.com/4b8b03c12d.js"
    crossorigin="anonymous"
  ></script>

</head>

<body>

  <!-- ================= LOGIN PAGE ================= -->

  <div
    class="login-page"
    id="loginPage"
  >

    <div class="login-box">

      <div class="admin-logo">

        <i class="fa-solid fa-user-shield"></i>

        <h2>
          MahaKali Admin
        </h2>

      </div>

      <input
        type="text"
        placeholder="Username"
        id="username"
      >

      <input
        type="password"
        placeholder="Password"
        id="password"
      >

      <button onclick="loginAdmin()">

        Log In

      </button>

    </div>

  </div>

  <!-- ================= DASHBOARD ================= -->

  <div
    class="dashboard"
    id="dashboard"
  >

    <!-- ================= NAVBAR ================= -->

    <header class="admin-navbar">

      <div class="admin-left">

        <i class="fa-solid fa-user-shield"></i>

        <h2>
          MahaKali Admin
        </h2>

      </div>

      <button onclick="logoutAdmin()">

        Logout

      </button>

    </header>

    <!-- ================= MAIN CONTENT ================= -->

    <div class="dashboard-content">

      <h1>
        Dashboard
      </h1>

      <!-- ================= FILTER ================= -->

      <div class="filter-box">

        <div>

          <label>
            From Date
          </label>

          <input
            type="date"
            id="fromDate"
          >

        </div>

        <div>

          <label>
            To Date
          </label>

          <input
            type="date"
            id="toDate"
          >

        </div>

        <button onclick="applyDateFilter()">

          Apply Filter

        </button>

        <button onclick="clearFilter()">

          Clear

        </button>

      </div>

      <!-- ================= STATS ================= -->

      <div class="stats-container">

        <div class="stat-card">

          <i class="fa-solid fa-cart-shopping"></i>

          <h2 id="totalOrders">
            0
          </h2>

          <p>
            Total Orders
          </p>

        </div>

        <div class="stat-card">

          <i class="fa-solid fa-clock"></i>

          <h2 id="pendingOrders">
            0
          </h2>

          <p>
            Pending Orders
          </p>

        </div>

        <div class="stat-card">

          <i class="fa-solid fa-truck"></i>

          <h2 id="deliveredOrders">
            0
          </h2>

          <p>
            Delivered Orders
          </p>

        </div>

        <div class="stat-card">

          <i class="fa-solid fa-indian-rupee-sign"></i>

          <h2>

            ₹<span id="totalRevenue">
              0
            </span>

          </h2>

          <p>
            Total Revenue
          </p>

        </div>

      </div>

      <!-- ================= FILTER BUTTONS ================= -->

      <div class="order-tabs">

        <button
          class="active"
          onclick="showOrders('all')"
        >

          All Orders

        </button>

        <button onclick="showOrders('pending')">

          Pending Orders

        </button>

        <button onclick="showOrders('delivered')">

          Delivered Orders

        </button>

      </div>

      <!-- ================= TABLE ================= -->

      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>
                Order ID
              </th>

              <th>
                Customer
              </th>

              <th>
                Items
              </th>

              <th>
                Amount
              </th>

              <th>
                Address
              </th>

              <th>
                Status
              </th>

              <th>
                Time
              </th>

              <th>
                Actions
              </th>

            </tr>

          </thead>

          <tbody id="ordersTable">

          </tbody>

        </table>

      </div>

    </div>

  </div>

  <!-- ================= CUSTOM POPUP ================= -->

  <div
    class="popup-overlay"
    id="popupOverlay"
  >

    <div class="popup-box">

      <h2 id="popupTitle">

        Title

      </h2>

      <p id="popupMessage">

        Message

      </p>

      <div class="popup-buttons">

        <button
          class="popup-btn cancel-btn"
          id="popupCancel"
        >

          Cancel

        </button>

        <button
          class="popup-btn ok-btn"
          id="popupOk"
        >

          OK

        </button>

      </div>

    </div>

  </div>

  <!-- ================= SCRIPT ================= -->

  <script src="admin.js"></script>

</body>

</html>
